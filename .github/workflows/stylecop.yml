name: StyleCop Check

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read

jobs:
  check-style:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Problem Matcher
        run: echo "::add-matcher::.github/matchers/dotnet-format.json"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and Style Check
        # 1. Added /p:TreatWarningsAsErrors=true to fail the PR on style issues
        # 2. Added -p:Platform=x64 to stop the XAML compiler from freaking out
        # 3. Kept path fixes for GitHub Annotations
        run: dotnet build --configuration Release -p:Platform=x64 /p:TreatWarningsAsErrors=true /p:Deterministic=true /p:ContinuousIntegrationBuild=true --no-incremental -clp:NoSummary
