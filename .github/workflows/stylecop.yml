name: StyleCop Check

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read

jobs:
  check-style:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Problem Matcher
        run: echo "::add-matcher::.github/matchers/dotnet-format.json"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and Style Check
        # Removed TreatWarningsAsErrors just for this run so the build 
        # doesn't stop immediately. We also add -keepgoing.
        run: dotnet build --configuration Release /p:Deterministic=true /p:ContinuousIntegrationBuild=true -clp:NoSummary --no-incremental