name: StyleCop Check

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check-style:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Get changed C# files
        id: changed
        shell: pwsh
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          $files = git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD `
            | Where-Object { $_ -match '\.cs$' }
          if ($files.Count -eq 0) {
            "has_files=false" >> $env:GITHUB_OUTPUT
          } else {
            "has_files=true" >> $env:GITHUB_OUTPUT
            $files | Set-Content changed_cs_files.txt
            Write-Host "Changed C# files:"
            $files | ForEach-Object { Write-Host "  $_" }
          }

      - name: Run StyleCop on changed files
        if: steps.changed.outputs.has_files == 'true'
        shell: pwsh
        run: |
          $files = Get-Content changed_cs_files.txt
          dotnet format analyzers VibeCoders/VibeCoders.csproj `
            --verify-no-changes `
            --report stylecop-report `
            --include $files

      - name: Annotate StyleCop issues
        if: always() && steps.changed.outputs.has_files == 'true'
        shell: pwsh
        run: |
          $reportFile = Get-ChildItem -Path stylecop-report -Filter '*.json' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $reportFile) { exit 0 }

          $report = Get-Content $reportFile.FullName -Raw | ConvertFrom-Json
          $changed = Get-Content changed_cs_files.txt | ForEach-Object { $_.Trim().ToLowerInvariant() -replace '\\', '/' }

          foreach ($doc in $report) {
            $filePath = ($doc.DocumentId.ProjectId.ProjectName + '/' + $doc.FileName) -replace '\\', '/'
            foreach ($change in $doc.FileChanges) {
              $line = $change.LineNumber
              $col  = $change.CharNumber
              $id   = $change.DiagnosticId
              $msg  = $change.FormatDescription
              "::error file=$filePath,line=$line,col=$col,title=$id::$msg"
            }
          }
