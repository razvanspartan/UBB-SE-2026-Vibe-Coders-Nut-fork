name: StyleCop and Format Check

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read

jobs:
  check-style:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: Fetches all history so we can compare branches

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Add Problem Matcher
        run: echo "::add-matcher::.github/matchers/dotnet-format.json"

      # Step 1: Get a list of modified .cs files
      - name: Get Modified Files
        id: files
        shell: bash
        run: |
          # Compare current branch to the target branch (usually main)
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.cs$' | xargs)
          echo "modified_files=$FILES" >> $GITHUB_OUTPUT

      # Step 2: Run format ONLY on those files
      - name: Format Check (Modified Files Only)
        if: steps.files.outputs.modified_files != ''
        run: |
          dotnet format --include ${{ steps.files.outputs.modified_files }} --verify-no-changes --verbosity diagnostic

      # Step 3: Build (This still catches StyleCop errors in the modified files)
      - name: Build and Style Check
        run: dotnet build --configuration Release /p:TreatWarningsAsErrors=true
