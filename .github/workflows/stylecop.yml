name: StyleCop and Format Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  check-style:
    runs-on: windows-latest # Required for WinUI 3 build dependencies

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x 

    - name: Restore dependencies
      run: dotnet restore

    # This runs the StyleCop Analyzers during build
    - name: Build with StyleCop
      run: dotnet build --configuration Release /p:TreatWarningsAsErrors=true

    # Optional: If you also want to check general whitespace/formatting
    - name: Dotnet Format Check
      run: dotnet format --verify-no-changes --verbosity diagnostic