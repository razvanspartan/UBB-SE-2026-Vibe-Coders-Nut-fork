name: StyleCop Check

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read

jobs:
  check-style:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Problem Matcher
        run: echo "::add-matcher::.github/matchers/dotnet-format.json"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Get Modified Files
        id: files
        shell: bash
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.cs$' | xargs)
          echo "modified_files=$FILES" >> $GITHUB_OUTPUT

      - name: StyleCop Check (Modified Files Only)
        if: steps.files.outputs.modified_files != ''
        shell: bash
        # --verify-no-changes makes it fail if there are style violations
        # analyzers --diagnostics=SA tells it to ONLY run StyleCop rules
        run: |
          dotnet format analyzers --include ${{ steps.files.outputs.modified_files }} --verify-no-changes --severity warning --verbosity diagnostic