name: StyleCop and Format Check

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read

jobs:
  check-style:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Problem Matcher
        run: echo "::add-matcher::.github/matchers/dotnet-format.json"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Get Modified Files
        id: files
        shell: bash
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.cs$' | xargs)
          echo "modified_files=$FILES" >> $GITHUB_OUTPUT

      # 1. RUN FORMAT FIRST
      # We add 'continue-on-error: true' so we can still run the build and see SA errors too
      - name: Format Check (Whitespace/Commas)
        if: steps.files.outputs.modified_files != ''
        shell: bash
        run: |
          dotnet format --include ${{ steps.files.outputs.modified_files }} --verify-no-changes --verbosity diagnostic
        continue-on-error: true 

      # 2. RUN BUILD (STYLECOP)
      - name: Build and Style Check (SA Warnings)
        run: dotnet build --configuration Release /p:TreatWarningsAsErrors=true /p:Deterministic=true -clp:NoSummary