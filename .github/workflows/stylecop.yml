name: StyleCop and Format Check

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read

jobs:
  check-style:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Add Problem Matcher
        run: echo "::add-matcher::.github/matchers/dotnet-format.json"

      - name: Get Modified Files
        id: files
        shell: bash
        run: |
          # Use origin/${{ github.base_ref }} to ensure we compare against the PR target
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.cs$' | xargs)
          echo "modified_files=$FILES" >> $GITHUB_OUTPUT

      - name: Format Check (Modified Files Only)
        if: steps.files.outputs.modified_files != ''
        shell: bash
        run: |
          dotnet format --include ${{ steps.files.outputs.modified_files }} --verify-no-changes --verbosity diagnostic

      - name: Build and Style Check
        run: dotnet build --configuration Release /p:TreatWarningsAsErrors=true

      # FIXED INDENTATION BELOW
      - name: PR Summary Comment
        if: failure()
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ## :x: StyleCop Check Failed
            I've found some styling issues in your modified files. 
            Please check the **Files changed** tab for specific line-by-line feedback! :art: